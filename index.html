<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사다리 게임</title>
    <link rel="stylesheet" href="game.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-glow"></div>
    <div class="container">
        <div class="top-bar">
            <header>
                <h1>사다리 게임</h1>
                <p>인원 수를 설정하고 플레이어를 선택한 다음, "결과 확인" 버튼을 눌러 주세요</p>
            </header>

            <div id="game-controls">
                <div class="control-group">
                    <label for="column-count">인원 수:</label>
                    <input type="number" id="column-count" min="2" max="10" value="4">
                </div>
                <button id="reset-btn" class="btn secondary">새 게임</button>
                <button id="check-result-btn" class="btn primary">결과 확인</button>
            </div>
        </div>

        <main id="ladder-container">
            <div id="mystery-box">
                <div class="mystery-content">
                    <span class="lock-icon">🔒</span>
                    <p>결과 확인 버튼을 눌러주세요</p>
                </div>
            </div>
            <canvas id="ladder-canvas"></canvas>
            <div id="participants-top" class="participants"></div>
            <div id="participants-bottom" class="participants"></div>
        </main>

        <div id="result-overlay" class="hidden">
            <div class="result-content">
                <h2>결과 확인</h2>
                <p id="result-text"></p>
                <button id="close-result" class="btn">닫기</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
